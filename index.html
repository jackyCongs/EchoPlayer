<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadowing Player Pro</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background-color: #f0f2f5; display: flex; gap: 20px; }
        .sidebar { width: 300px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); height: calc(100vh - 40px); overflow-y: auto; }
        .main-content { flex: 1; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2, h3 { color: #333; margin-top: 0; }

        /* Playlist Styles */
        .folder-item { background: #f0f0f0; padding: 10px; margin-top: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; border-left: 4px solid #007bff; }

        /* 🏆 已应用 Flexbox 布局修复错行问题 */
        .ep-item {
            padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-top: 5px;
            cursor: pointer; transition: all 0.2s; font-size: 13px;
            display: flex; justify-content: space-between; align-items: center; gap: 10px;
        }
        .ep-item:hover { background: #f8f9fa; border-color: #007bff; }
        .ep-item.active { background: #e7f1ff; border-color: #007bff; font-weight: bold; }

        /* 🏆 绝对禁止 Badge 换行 */
        .badge { font-size: 12px; background: #28a745; color: white; padding: 2px 6px; border-radius: 4px; margin-left: 5px; white-space: nowrap; flex-shrink: 0; }

        /* Video & Controls */
        video { width: 100%; border-radius: 8px; background: #000; margin-bottom: 20px; aspect-ratio: 16/9; }
        .controls-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .control-group { background: #f8f9fa; padding: 15px; border-radius: 8px; }

        .btn { background: #007bff; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 14px; margin: 4px 2px; }
        .btn:hover { background: #0056b3; }
        .btn.secondary { background: #6c757d; }
        .btn.warning { background: #ffc107; color: black; }
        .btn.success { background: #28a745; }

        .manual-time { width: 60px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        .saved-segment-box { background: #e3f2fd; padding: 10px; border-radius: 6px; margin-top: 10px; display: none; border: 1px dashed #007bff; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>📺 Episodes</h2>
    <div style="margin-bottom: 15px;">
        <input type="text" id="pcIP" placeholder="Enter PC IP (e.g. 192.168.1.10)" style="width: 80%; padding: 8px;">
        <button onclick="connectToPC(null)" class="btn success" style="width: 100%; margin-top: 5px;">Connect to Echo Server</button>
    </div>
    <div id="playlist">
        <p style="color: #666; font-size: 14px; text-align: center;">Click the button above to load your files.</p>
    </div>
</div>

<div class="main-content">
    <h2 id="currentEpTitle">Select an episode to start</h2>
    <video id="player" controls></video>

    <div class="controls-grid">
        <div class="control-group">
            <h3>🔄 Intensive Loop</h3>
            <button class="btn" id="btnSetStart">Set [A]</button>
            <button class="btn" id="btnSetEnd">Set [B]</button>
            <button class="btn success" id="btnToggleLoop">Loop OFF</button>
            <button class="btn secondary" id="btnJumpToStart">Replay [A]</button>

            <div style="margin-top: 10px;">
                <label>Manual (MM:SS): </label>
                <input type="text" id="manualA" class="manual-time" placeholder="00:00"> to
                <input type="text" id="manualB" class="manual-time" placeholder="00:00">
                <button class="btn secondary" id="btnApplyManual">Apply</button>
            </div>

            <div style="margin-top: 15px; border-top: 1px solid #ddd; padding-top: 10px;">
                <button class="btn warning" id="btnSaveSegment">💾 Save Segment to Server</button>
                <div id="savedSegmentUI" class="saved-segment-box">
                    <strong>Saved Cut:</strong> <span id="savedTimeTxt"></span>
                    <button class="btn success" id="btnPlaySaved" style="width: 100%; margin-top: 5px;">▶️ Play Saved Segment</button>
                </div>
            </div>
        </div>

        <div class="control-group">
            <h3>💬 Subtitles & Tools</h3>
            <select id="subSelector" style="padding: 8px; width: 100%; margin-bottom: 10px;">
                <option value="none">No Subtitles (无字幕)</option>
                <option value="en">English (仅英文)</option>
                <option value="bilingual">Bilingual (中英双语)</option>
            </select>

            <button class="btn secondary" id="btnMinus">-1 Sec</button>
            <button class="btn secondary" id="btnPlus">+1 Sec</button>
            <button class="btn secondary" id="btnBlindMode">👁️ Blind Mode</button>

            <div style="margin-top: 10px;">
                <label>Speed: </label>
                <select id="speedSelector" style="padding: 6px;">
                    <option value="1.0">1.0x</option>
                    <option value="0.9">0.9x</option>
                    <option value="0.8">0.8x</option>
                    <option value="0.7">0.7x</option>
                </select>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Global States ---
    const player = document.getElementById('player');
    let currentEpKey = null;
    let loopStart = -1;
    let loopEnd = -1;
    let isLooping = false;
    let isBlind = false;
    let savedSegments = {};
    let serverIP = "";

    // --- 1. Networking & Sync ---
    async function connectToPC(targetIP) {
        const ip = targetIP || document.getElementById('pcIP').value;
        if (!ip) return false;
        serverIP = ip;

        try {
            const dataRes = await fetch(`http://${ip}:8080/api/segments/get`);
            savedSegments = await dataRes.json();

            const listRes = await fetch(`http://${ip}:8080/api/list`);
            const categories = await listRes.json();
            renderPlaylist(categories);

            localStorage.setItem('echoplayer_pc_ip', ip);
            document.getElementById('currentEpTitle').innerText = "☁️ Server Synced: " + ip;
            return true;
        } catch (err) {
            console.error("Sync error:", err);
            return false;
        }
    }

    async function syncToServer() {
        await fetch(`http://${serverIP}:8080/api/segments/save`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(savedSegments)
        });
    }

    // --- 2. Playlist Rendering ---
    function renderPlaylist(categories) {
        const playlist = document.getElementById('playlist');
        playlist.innerHTML = '';

        categories.forEach((cat, index) => {
            const folderDiv = document.createElement('div');
            folderDiv.className = 'folder-item';
            folderDiv.innerHTML = `📁 ${cat.alias} <span style="float:right; font-size:12px; color:#666;">${cat.episodes.length} files</span>`;

            const epContainer = document.createElement('div');
            epContainer.id = `cat-${index}`;
            epContainer.style.display = 'none';
            epContainer.style.paddingLeft = '10px';

            folderDiv.onclick = () => {
                const isHidden = epContainer.style.display === 'none';
                document.querySelectorAll('[id^="cat-"]').forEach(el => el.style.display = 'none');
                epContainer.style.display = isHidden ? 'block' : 'none';
            };

            cat.episodes.forEach(ep => {
                const div = document.createElement('div');
                div.className = 'ep-item';
                div.id = 'ep-' + ep.key.replace(/[^a-zA-Z0-9]/g, '-');

                const hasSave = savedSegments[ep.key];
                const badgeHtml = hasSave ? `<span class="badge">Has Save</span>` : '';

                // 🏆 使用 Span 包裹标题，防止超长文本挤压 Badge
                div.innerHTML = `
                    <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                        🎬 ${ep.key}
                    </span>
                    ${badgeHtml}
                `;

                div.onclick = (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('.ep-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    playVideo(ep);
                    checkSavedSegmentUI();
                };
                epContainer.appendChild(div);
            });

            playlist.appendChild(folderDiv);
            playlist.appendChild(epContainer);
        });
    }

    // --- 3. Video & Subtitle Loading ---
    function playVideo(ep) {
        currentEpKey = ep.key;
        player.src = ep.video;
        player.innerHTML = '';
        document.getElementById('currentEpTitle').innerText = "Playing: " + ep.key;

        if (ep.enSrt) addRemoteTrack(ep.enSrt, 'en', 'English');
        if (ep.cnSrt) addRemoteTrack(ep.cnSrt, 'zh', 'Bilingual');

        player.play();
    }

    function addRemoteTrack(url, lang, label) {
        fetch(url).then(r => r.text()).then(text => {
            const track = document.createElement('track');
            track.kind = 'subtitles';
            track.srclang = lang;
            track.label = label;
            track.src = srtToVtt(text);
            player.appendChild(track);
        });
    }

    function srtToVtt(srtText) {
        let vttText = "WEBVTT\n\n";
        let processedText = srtText.replace(/(\d{2}:\d{2}:\d{2}),(\d{3})/g, '$1.$2');
        processedText = processedText.replace(/\{[^}]+\}/g, '');
        vttText += processedText;
        const blob = new Blob([vttText], { type: 'text/vtt' });
        return URL.createObjectURL(blob);
    }

    function applySubtitleSelection() {
        const val = document.getElementById('subSelector').value;
        for (let i = 0; i < player.textTracks.length; i++) {
            player.textTracks[i].mode = 'disabled';
            if (val === 'en' && player.textTracks[i].language === 'en') player.textTracks[i].mode = 'showing';
            if (val === 'bilingual' && player.textTracks[i].language === 'zh') player.textTracks[i].mode = 'showing';
        }
    }
    document.getElementById('subSelector').addEventListener('change', applySubtitleSelection);

    // --- 4. Loop & Time Control ---
    function parseTime(str) {
        const parts = str.split(':').map(Number);
        if (parts.length === 2) return parts[0] * 60 + parts[1];
        if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
        return parseFloat(str);
    }

    function formatTime(seconds) {
        if (seconds < 0) return "--:--";
        return new Date(seconds * 1000).toISOString().substr(14, 5);
    }

    function updateLoopInputs() {
        document.getElementById('manualA').value = formatTime(loopStart);
        document.getElementById('manualB').value = formatTime(loopEnd);
    }

    document.getElementById('btnApplyManual').addEventListener('click', () => {
        const a = parseTime(document.getElementById('manualA').value);
        const b = parseTime(document.getElementById('manualB').value);
        if (!isNaN(a) && !isNaN(b) && b > a) {
            loopStart = a; loopEnd = b;
            updateLoopInputs();
            alert(`Manual loop set: ${formatTime(a)} to ${formatTime(b)}`);
        }
    });

    document.getElementById('btnSetStart').addEventListener('click', () => { loopStart = player.currentTime; updateLoopInputs(); });
    document.getElementById('btnSetEnd').addEventListener('click', () => { loopEnd = player.currentTime; updateLoopInputs(); });
    document.getElementById('btnJumpToStart').addEventListener('click', () => { if (loopStart >= 0) { player.currentTime = loopStart; player.play(); } });

    const loopBtn = document.getElementById('btnToggleLoop');
    loopBtn.addEventListener('click', () => {
        isLooping = !isLooping;
        loopBtn.innerText = isLooping ? "Loop ON (循环中)" : "Loop OFF";
        loopBtn.style.background = isLooping ? "#dc3545" : "#28a745";
        if (isLooping && loopStart >= 0) { player.currentTime = loopStart; player.play(); }
    });

    player.addEventListener('timeupdate', () => {
        if (isLooping && player.currentTime >= loopEnd && loopEnd > 0) {
            player.currentTime = loopStart; player.play();
        }
    });

    // --- 5. Save & Memory Logic ---
    function checkSavedSegmentUI() {
        const ui = document.getElementById('savedSegmentUI');
        if (currentEpKey && savedSegments[currentEpKey]) {
            ui.style.display = 'block';
            document.getElementById('savedTimeTxt').innerText =
                `${formatTime(savedSegments[currentEpKey].start)} to ${formatTime(savedSegments[currentEpKey].end)}`;
        } else {
            ui.style.display = 'none';
        }
    }

    document.getElementById('btnSaveSegment').onclick = async () => {
        if (!currentEpKey || loopStart < 0 || loopEnd < 0) return;

        savedSegments[currentEpKey] = { start: loopStart, end: loopEnd };
        await syncToServer();
        checkSavedSegmentUI();

        const safeId = 'ep-' + currentEpKey.replace(/[^a-zA-Z0-9]/g, '-');
        const itemUI = document.getElementById(safeId);
        if (itemUI && !itemUI.innerHTML.includes('Has Save')) {
            itemUI.innerHTML += `<span class="badge">Has Save</span>`;
        }
    };

    document.getElementById('btnPlaySaved').addEventListener('click', () => {
        const data = savedSegments[currentEpKey];
        if (data) {
            loopStart = data.start; loopEnd = data.end;
            updateLoopInputs();
            isLooping = true;
            loopBtn.innerText = "Loop ON (循环中)";
            loopBtn.style.background = "#dc3545";
            player.currentTime = loopStart;
            player.play();
        }
    });

    // --- 6. Shortcuts & Utilities ---
    document.getElementById('btnMinus').addEventListener('click', () => player.currentTime = Math.max(0, player.currentTime - 1));
    document.getElementById('btnPlus').addEventListener('click', () => player.currentTime += 1);
    document.getElementById('speedSelector').addEventListener('change', (e) => player.playbackRate = parseFloat(e.target.value));

    document.getElementById('btnBlindMode').addEventListener('click', (e) => {
        isBlind = !isBlind;
        player.style.filter = isBlind ? 'brightness(0)' : 'none';
        e.target.style.background = isBlind ? '#343a40' : '#6c757d';
    });

    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        switch(e.key.toLowerCase()) {
            case ' ': e.preventDefault(); player.paused ? player.play() : player.pause(); break;
            case 'arrowleft': player.currentTime = Math.max(0, player.currentTime - 1); break;
            case 'arrowright': player.currentTime += 1; break;
            case 'r': if (loopStart >= 0) { player.currentTime = loopStart; player.play(); } break;
        }
    });

    // --- 7. Initialization ---
    async function autoScan() {
        const statusTxt = document.getElementById('currentEpTitle');
        const savedIP = localStorage.getItem('echoplayer_pc_ip');

        if (savedIP) {
            statusTxt.innerText = `🔄 Attempting to reconnect to ${savedIP}...`;
            if (await connectToPC(savedIP)) return;
        }

        statusTxt.innerText = "🔍 Searching for your PC in LAN...";
        const subnet = "192.168.31.";
        const port = "8080";
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 1500);

        const scanPromises = [];
        for (let i = 1; i < 255; i++) {
            const ip = `${subnet}${i}`;
            scanPromises.push(
                fetch(`http://${ip}:${port}/api/ping`, { signal: controller.signal })
                    .then(res => res.ok ? ip : null)
                    .catch(() => null)
            );
        }

        try {
            const validPromises = scanPromises.filter(p => p !== null);
            const fastIP = await Promise.any(validPromises);
            if (fastIP) {
                clearTimeout(timeoutId);
                connectToPC(fastIP);
            }
        } catch (e) {
            statusTxt.innerText = "❌ No EchoPlayer found. Please enter IP manually.";
        }
    }

    window.onload = autoScan;
</script>
</body>
</html>
